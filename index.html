<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>♡Ngày 8 Tháng 3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=Playfair+Display:ital@1&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --rose: #ff4d6d;
            --blush: #ffb3c1;
            --cream: #fff9f0;
            --ink: #1a0a0f;
            --glass: rgba(255, 255, 255, 0.08)
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'DM Mono', monospace
        }

        #wrap {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center
        }

        #v {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1)
        }

        #c {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1)
        }

        #loader {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--ink);
            z-index: 50;
            transition: opacity 0.8s ease
        }

        #loader.hide {
            opacity: 0;
            pointer-events: none
        }

        .heart-anim {
            font-size: clamp(48px, 10vw, 80px);
            animation: pulse 1.2s ease-in-out infinite
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: .6
            }

            50% {
                transform: scale(1.15);
                opacity: 1
            }
        }

        #loader p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--blush);
            font-size: clamp(16px, 3vw, 22px);
            margin-top: 18px;
            letter-spacing: .04em
        }

        #loader small {
            color: rgba(255, 179, 193, 0.45);
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: .1em
        }

        #status {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            z-index: 10
        }

        #badge {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 77, 109, 0.3);
            border-radius: 100px;
            padding: 6px 18px;
            color: var(--blush);
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            transition: all .3s
        }

        #badge.active {
            background: rgba(255, 77, 109, 0.25);
            border-color: var(--rose);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.4)
        }

        #btn {
            position: absolute;
            bottom: clamp(24px, 5vh, 48px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: 14px 32px;
            border-radius: 100px;
            cursor: pointer;
            transition: all .25s;
            white-space: nowrap
        }

        #btn:hover {
            background: rgba(255, 77, 109, 0.3);
            border-color: var(--rose);
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.35)
        }

        #btn:active {
            transform: translateX(-50%) scale(.96)
        }

        #flash {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            transition: opacity .08s
        }

        #gallery {
            position: absolute;
            bottom: clamp(90px, 15vh, 130px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw
        }

        .thumb {
            width: clamp(52px, 8vw, 72px);
            height: clamp(52px, 8vw, 72px);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            cursor: pointer;
            transition: transform .2s, border-color .2s;
            animation: popIn .3s cubic-bezier(.34, 1.56, .64, 1)
        }

        .thumb:hover {
            transform: scale(1.08);
            border-color: var(--rose)
        }

        @keyframes popIn {
            from {
                transform: scale(0) rotate(-8deg);
                opacity: 0
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1
            }
        }

        #saved {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 77, 109, 0.9);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 8px 20px;
            border-radius: 100px;
            z-index: 20;
            opacity: 0;
            transition: opacity .3s;
            white-space: nowrap
        }

        #saved.show {
            opacity: 1
        }

        #corner {
            position: absolute;
            top: 14px;
            right: 18px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            letter-spacing: .08em
        }

        #transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: radial-gradient(circle, rgba(255, 77, 109, 0.95), rgba(26, 10, 15, 0.98));
            opacity: 0;
            transition: opacity 0.8s ease
        }

        #transition-overlay.active {
            opacity: 1;
            pointer-events: all
        }

        #transition-overlay .big-heart {
            font-size: clamp(80px, 20vw, 160px);
            animation: bigPulse 0.6s ease-in-out infinite
        }

        #transition-overlay p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #ffb3c1;
            font-size: clamp(18px, 4vw, 28px);
            margin-top: 16px;
            letter-spacing: .06em
        }

        @keyframes bigPulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.15)
            }
        }

        #back-btn {
            position: absolute;
            top: 14px;
            left: 18px;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 179, 193, 0.3);
            border-radius: 100px;
            padding: 6px 16px;
            color: var(--blush);
            font-size: 11px;
            letter-spacing: .08em;
            text-decoration: none;
            transition: all .3s;
            font-family: 'DM Mono', monospace
        }

        #back-btn:hover {
            background: rgba(255, 77, 109, 0.25);
            border-color: var(--rose);
            color: #fff
        }
    </style>
</head>

<body>
    <div id="wrap">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
        <div id="loader">
            <div class="heart-anim">🤍</div>
            <p>Đợi chúng tớ xíu, Chúng tớ đag chuẩn bị </p>
            <small id="ldtxt">initializing mediapipe</small>
        </div>

        <div id="status">
            <div id="badge">awaiting gesture</div>
        </div>
        <div id="flash"></div>
        <div id="saved">✦ detected!</div>
        <div id="gallery"></div>
        <div id="corner">hand heart ♡</div>
        <div id="transition-overlay">
            <div class="big-heart">💖</div>
            <p>Con nhà ai mà xinh gái quá taa</p>
        </div>
    </div>
    <script src="https://unpkg.com/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin></script>
    <script src="https://unpkg.com/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin></script>
    <script>
        let v = document.getElementById('v'),
            c = document.getElementById('c'),
            ctx = c.getContext('2d'),
            flash = document.getElementById('flash'),
            badge = document.getElementById('badge'),
            gallery = document.getElementById('gallery'),
            saved = document.getElementById('saved'),
            loader = document.getElementById('loader'),
            ldtxt = document.getElementById('ldtxt'),
            overlay = document.getElementById('transition-overlay'),
            t0 = performance.now(),
            firstFrame = true,
            cooldown = false,
            redirecting = false,
            svdTimer = null,
            holdStart = 0,
            holdNeeded = 500,
            hands, cam;

        function resize() {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) }

        function doFlash() {
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 120);
        }

        function showSaved() {
            clearTimeout(svdTimer);
            saved.classList.add('show');
            svdTimer = setTimeout(() => saved.classList.remove('show'), 2000);
        }

        function goToGreeting() {
            if (redirecting) return;
            redirecting = true;

            // Capture the camera frame (the person making the heart)
            var snapCanvas = document.createElement('canvas');
            snapCanvas.width = v.videoWidth || 1280;
            snapCanvas.height = v.videoHeight || 720;
            var snapCtx = snapCanvas.getContext('2d');
            snapCtx.drawImage(v, 0, 0, snapCanvas.width, snapCanvas.height);
            try { localStorage.setItem('heartPhoto', snapCanvas.toDataURL('image/png')); } catch (e) { }

            doFlash();
            showSaved();
            setTimeout(() => {
                overlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = 'hand-heart.html';
                }, 1500);
            }, 300);
        }

        function onResults(r) {
            if (firstFrame) {
                firstFrame = false;
                let ms = ((performance.now() - t0) / 1000).toFixed(1);
                loader.classList.add('hide');
                setTimeout(() => { loader.style.display = 'none' }, 900);
                ldtxt.textContent = 'Loaded in ' + ms + 's';
            }
            ctx.clearRect(0, 0, c.width, c.height);
            let ml = r.multiHandLandmarks;
            if (!ml || ml.length < 2) { badge.textContent = 'tay bạn đâu 🙂?'; badge.classList.remove('active'); return }
            ml.forEach(lm => {
                drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(255,179,193,0.5)', lineWidth: 1.5 });
                drawLandmarks(ctx, lm, { color: 'rgba(255,77,109,0.85)', lineWidth: 1, radius: 3 });
            });
            let a = ml[0], b = ml[1];
            let dThumb = dist(a[4], b[4]), dIdx = dist(a[8], b[8]);
            let dCross1 = dist(a[4], b[8]), dCross2 = dist(a[8], b[4]);
            let thumbsClose = dThumb < 0.10, idxClose = dIdx < 0.10;
            let crossOk = dCross1 > 0.05 && dCross2 > 0.05;
            let detected = thumbsClose && idxClose && crossOk;
            let now = performance.now();
            if (detected) {
                if (!holdStart) holdStart = now;
                let pct = Math.min((now - holdStart) / holdNeeded, 1);
                badge.textContent = pct < 1 ? `♡ ${Math.round(pct * 100)}%` : 'xinh quó 💖';
                badge.classList.add('active');
                if (pct >= 1 && !cooldown) { cooldown = true; holdStart = 0; goToGreeting() }
            } else {
                holdStart = 0;
                badge.textContent = dThumb < 0.10 ? 'làm 1 ♡ bằng 2 tay' : dIdx < 0.10 ? 'làm 1 ♡ bằng 2 tay' : 'làm 1 ♡ bằng 2 tay';
                badge.classList.remove('active');
            }
        }

        hands = new Hands({ locateFile: f => `https://unpkg.com/@mediapipe/hands@0.4.1646424915/${f}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        cam = new Camera(v, {
            onFrame: async () => await hands.send({ image: v }),
            width: 1280, height: 720, facingMode: 'user'
        });
        cam.start().catch(e => { ldtxt.textContent = 'camera error: ' + e.message });
    </script>
</body>


</html>
